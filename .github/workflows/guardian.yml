name: Devin Guardian

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Guardian
        run: docker compose run --rm guardian
        env:
          DEVIN_TOKEN: ${{ secrets.DEVIN_TOKEN }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          TARGET_REPO: ${{ vars.TARGET_REPO || 'oarmstrong95/superset' }}
          TARGET_REPO_URL: ${{ vars.TARGET_REPO_URL || 'https://github.com/oarmstrong95/superset' }}
